<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinical Harmony — Women's symptom pattern tracker</title>
    <meta
      name="description"
      content="A calm, private symptom-pattern tracker that turns daily check-ins into clinical-grade insights you can share with your care team."
    />
    <meta name="theme-color" content="#FBF7F6" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%238E3A5D'/%3E%3Cpath d='M50 22c8 10 8 20 0 30-8-10-8-20 0-30zm0 56c-8-10-8-20 0-30 8 10 8 20 0 30zM22 50c10-8 20-8 30 0-10 8-20 8-30 0zm56 0c-10 8-20 8-30 0 10-8 20-8 30 0z' fill='%23FFD9E2'/%3E%3C/svg%3E"
    />
    <!-- Set the theme before first paint to avoid a flash of the wrong palette. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('ch.theme');
          var dark =
            saved === 'dark' ||
            (saved !== 'light' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&family=Atkinson+Hyperlegible+Next:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
